<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alles Gute zum Geburtstag 💖</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐱</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: #fff0f5;
  font-family: 'DM Sans', sans-serif;
  overflow: hidden;
  position: relative;
  padding: 1rem;
}

.particle {
  position: fixed;
  pointer-events: none;
  animation: floatUp linear infinite;
  opacity: 0;
}
@keyframes floatUp {
  0%   { transform: translateY(0) rotate(0deg); opacity: 0.8; }
  100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
}

h1 {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: clamp(20px, 4.5vw, 30px);
  color: #c01f50;
  text-align: center;
  margin-bottom: 0.35rem;
  animation: fadeIn 1s 0.3s both;
}
#sub {
  font-size: 13px;
  color: #c06;
  text-align: center;
  margin-bottom: 1.2rem;
  font-weight: 300;
  animation: fadeIn 1s 0.6s both;
  min-height: 20px;
  transition: opacity 0.3s;
}
@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}

#scene {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
}

.cat-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  opacity: 0;
  transition: opacity 0.8s, transform 0.8s;
  min-width: 80px;
}
.cat-wrap.left  { transform: translateX(120px); }
.cat-wrap.right { transform: translateX(-120px); }
.cat-wrap.visible { opacity: 1; }
.cat-wrap.spread.left  { transform: translateX(0); }
.cat-wrap.spread.right { transform: translateX(0); }

.cat-wrap pre {
  font-family: 'Courier New', monospace;
  font-size: clamp(7px, 1.6vw, 10px);
  line-height: 1.25;
  color: #d42a60;
  white-space: pre;
  user-select: none;
  text-align: center;
}
.cat-name {
  font-size: 12px;
  font-weight: 500;
  color: #e8386e;
  letter-spacing: 0.06em;
  text-transform: lowercase;
  font-style: italic;
}
.cat-says {
  font-size: 10px;
  color: #c06;
  font-style: italic;
  opacity: 0;
  transition: opacity 0.6s;
  text-align: center;
  max-width: 80px;
}
.cat-says.visible { opacity: 1; }

#stage {
  position: relative;
  width: min(260px, 68vw);
  height: min(260px, 68vw);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

#cats-center {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: opacity 0.8s;
}
#cats-center pre {
  font-family: 'Courier New', monospace;
  font-size: clamp(6.5px, 1.5vw, 9.5px);
  line-height: 1.22;
  color: #c01f50;
  opacity: 0.15;
  filter: blur(2.5px);
  white-space: pre;
  user-select: none;
  text-align: center;
  transition: opacity 1s, filter 1s;
}
#cats-center.revealed pre {
  opacity: 0.9;
  filter: blur(0px);
}
#cats-center.fading { opacity: 0; }

canvas {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
}

#btn {
  margin-top: 1.4rem;
  padding: 13px 36px;
  font-size: 16px;
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
  border-radius: 999px;
  border: none;
  background: linear-gradient(135deg, #e8386e, #c01f50);
  color: #fff;
  cursor: pointer;
  box-shadow: 0 4px 20px rgba(220,40,100,0.35);
  transition: transform 0.15s, box-shadow 0.15s;
  letter-spacing: 0.03em;
  animation: fadeIn 1s 0.9s both;
}
#btn:hover:not(:disabled) { transform: scale(1.05); box-shadow: 0 6px 28px rgba(220,40,100,0.45); }
#btn:active:not(:disabled) { transform: scale(0.97); }
#btn:disabled { opacity: 0.5; cursor: default; }

#msg {
  margin-top: 1rem;
  font-size: 17px;
  font-family: 'Playfair Display', serif;
  font-style: italic;
  color: #c01f50;
  min-height: 26px;
  text-align: center;
  opacity: 0;
  transition: opacity 0.8s;
  padding: 0 0.5rem;
}
#hint {
  font-size: 11px;
  color: #d06;
  opacity: 0.45;
  margin-top: 0.5rem;
  font-style: italic;
  transition: opacity 0.6s;
}
</style>
</head>
<body>

<h1>HAPPY BIRTHDAYYYYY!</h1>
<div id="sub">Klick mal hier, klick mal da… 🤔</div>

<div id="scene">
  <div class="cat-wrap left" id="cat-left">
    <pre id="cat-left-ascii"></pre>
    <div class="cat-name">whip whip</div>
    <div class="cat-says" id="says-left">"ich wusste<br>es schon immer!"</div>
  </div>

  <div id="stage">
    <div id="cats-center"><pre id="ascii-center"></pre></div>
    <canvas id="c"></canvas>
  </div>

  <div class="cat-wrap right" id="cat-right">
    <pre id="cat-right-ascii"></pre>
    <div class="cat-name">nae nae</div>
    <div class="cat-says" id="says-right">"ich auch,<br>ich auch!! 🐾"</div>
  </div>
</div>

<button id="btn">Lüfte das Geheimnis 🔍</button>
<div id="msg"></div>
<div id="hint">vielleicht ja absolute peak-u…?</div>

<script>
const CAT_LEFT = `
 /\\_/\\
( ^w^ )
 (   )
  | |
 (_|_)
`;

const CAT_RIGHT = `
 /\\_/\\
( ^w^ )
 (   )
  | |
 (_|_)
`;

const CAT_CENTER = `
 /\\_/\\   /\\_/\\
( ^w^ ) ( ^w^ )
 (   )   (   )
  | |     | |
 (_|_)   (_|_)

 ~ wir wissen was ~
 ~   sich hier    ~
 ~   verbirgt...  ~
`;

document.getElementById('ascii-center').textContent = CAT_CENTER;
document.getElementById('cat-left-ascii').textContent = CAT_LEFT;
document.getElementById('cat-right-ascii').textContent = CAT_RIGHT;

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, sc, cx, cy;

function setSize() {
  const s = document.getElementById('stage').offsetWidth;
  canvas.width = s; canvas.height = s;
  W = s; H = s;
  sc = W / 38;
  cx = W / 2; cy = H / 2 + sc * 0.6;
}

function hx(t) { return 16 * Math.pow(Math.sin(t), 3); }
function hy(t) { return -(13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t)); }

function drawProgress(progress) {
  ctx.clearRect(0,0,W,H);
  const steps = Math.floor(progress * 300);
  ctx.save();
  ctx.lineWidth = Math.max(2.5, W/70);
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  let px = null, py = null;
  for (let i = 0; i <= steps; i++) {
    const t = (i/300)*2*Math.PI;
    const x = cx + hx(t)*sc, y = cy + hy(t)*sc;
    if (i===0) { px=x; py=y; continue; }
    const a = 0.2 + 0.8*(i/(steps+1));
    ctx.strokeStyle = `rgba(232,56,110,${a})`;
    ctx.beginPath(); ctx.moveTo(px,py); ctx.lineTo(x,y); ctx.stroke();
    px=x; py=y;
  }
  if (steps > 0 && progress < 1) {
    const t = (steps/300)*2*Math.PI;
    const x = cx + hx(t)*sc, y = cy + hy(t)*sc;
    const r = Math.max(5, W/44);
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
    ctx.fillStyle = 'rgba(255,120,160,0.88)'; ctx.fill();
    ctx.beginPath(); ctx.arc(x,y,r*0.42,0,Math.PI*2);
    ctx.fillStyle = '#fff'; ctx.fill();
  }
  ctx.restore();
  if (progress >= 1) drawFull();
}

function drawFull() {
  ctx.save();
  ctx.beginPath();
  for (let i = 0; i <= 300; i++) {
    const t = (i/300)*2*Math.PI;
    const x = cx + hx(t)*sc, y = cy + hy(t)*sc;
    i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
  }
  ctx.closePath();
  const g = ctx.createRadialGradient(cx, cy-sc*2, sc, cx, cy, sc*8);
  g.addColorStop(0, 'rgba(255,160,190,0.32)');
  g.addColorStop(1, 'rgba(232,56,110,0.2)');
  ctx.fillStyle = g; ctx.fill();
  ctx.strokeStyle = '#e8386e';
  ctx.lineWidth = Math.max(2.5, W/70);
  ctx.stroke();
  ctx.restore();
}

let animId = null;
let phase = 'idle';

const btn = document.getElementById('btn');

btn.addEventListener('click', function() {
  if (phase === 'idle') start();
  else if (phase === 'done') reset();
});

function start() {
  phase = 'reveal';
  btn.disabled = true;
  btn.textContent = '…';
  document.getElementById('hint').style.opacity = 0;
  document.getElementById('sub').textContent = 'Zwei süße Katzen! Und nicht nur irgendwelche... 🐱';

  document.getElementById('cats-center').classList.add('revealed');

  setTimeout(() => {
    document.getElementById('sub').textContent = 'Waitttttttttt ✨';
    document.getElementById('cats-center').classList.add('fading');

    const cl = document.getElementById('cat-left');
    const cr = document.getElementById('cat-right');
    cl.classList.add('visible');
    cr.classList.add('visible');
    setTimeout(() => {
      cl.classList.add('spread');
      cr.classList.add('spread');
    }, 50);

    setTimeout(() => {
      document.getElementById('cats-center').style.display = 'none';
      startDraw();
    }, 900);
  }, 1500);
}

function startDraw() {
  phase = 'draw';
  setSize();
  let t0 = null;
  const dur = 2300;
  function tick(ts) {
    if (!t0) t0 = ts;
    const p = Math.min((ts-t0)/dur, 1);
    drawProgress(p);
    if (p < 1) {
      animId = requestAnimationFrame(tick);
    } else {
      phase = 'done';
      btn.disabled = false;
      btn.textContent = 'Nochmal 💖';
      document.getElementById('sub').textContent = 'Ich liebe dich Mitch <3';
      setTimeout(() => {
        document.getElementById('says-left').classList.add('visible');
        setTimeout(() => document.getElementById('says-right').classList.add('visible'), 400);
      }, 300);
      showMsg();
      spawnParticles();
    }
  }
  animId = requestAnimationFrame(tick);
}

function reset() {
  if (animId) cancelAnimationFrame(animId);
  phase = 'idle';
  ctx.clearRect(0,0,W,H);

  const cc = document.getElementById('cats-center');
  cc.style.display = 'flex';
  cc.classList.remove('revealed','fading');

  const cl = document.getElementById('cat-left');
  const cr = document.getElementById('cat-right');
  cl.classList.remove('visible','spread');
  cr.classList.remove('visible','spread');
  document.getElementById('says-left').classList.remove('visible');
  document.getElementById('says-right').classList.remove('visible');

  document.getElementById('msg').style.opacity = 0;
  document.getElementById('hint').style.opacity = 0.45;
  document.getElementById('sub').textContent = 'Was versteckt sich hier wohl…? 🤔';
  btn.textContent = 'Lüftet das Geheimnis 🔍';
  btn.disabled = false;
}

const msgs = [
  'Watch me nae nae! OwO',
  'Du bist so \'ne Mausi! 🌟',
  'Einfach volljährig in den Staaten! 🎉',
  'Watch me whip, whip...! 🌸',
  'ICH LIEBE DICHHHHH! 💕',
];
let lastMsgIdx = -1;
function showMsg() {
  let idx;
  do { idx = Math.floor(Math.random() * msgs.length); } while (idx === lastMsgIdx);
  lastMsgIdx = idx;
  const el = document.getElementById('msg');
  el.style.opacity = 0;
  setTimeout(() => {
    el.textContent = msgs[idx];
    el.style.opacity = 1;
  }, 200);
}

const emojis = ['💖','🌸','✨','🎉','🌷','💫','🎂','🐱'];
function spawnParticles() {
  for (let i = 0; i < 22; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.textContent = emojis[Math.floor(Math.random()*emojis.length)];
    p.style.left = Math.random()*100 + 'vw';
    p.style.bottom = '-30px';
    p.style.fontSize = (14 + Math.random()*14) + 'px';
    p.style.animationDuration = (3 + Math.random()*3) + 's';
    p.style.animationDelay = (Math.random()*1.5) + 's';
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 7000);
  }
}

setSize();
window.addEventListener('resize', setSize);
</script>
</body>
</html>
